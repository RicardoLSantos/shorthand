# iOS Lifestyle Medicine FHIR IG — CI/CD Pipeline
# Validates FSH with SUSHI on every push; runs full IG Publisher build on main/PRs.
#
# Two jobs:
#   1. sushi-validate: Fast (~30s) — catches FSH syntax errors
#   2. ig-build: Full (~15-20min) — runs IG Publisher, uploads QA report
#
# Based on HL7 IG CI patterns (IPS, US Core, mCODE).
# Security: No untrusted inputs used in run commands.

name: IG Build

on:
  push:
    branches: [main]
    paths:
      - 'input/**'
      - 'sushi-config.yaml'
      - 'ig.ini'
      - '_genonce.sh'
      - '.github/workflows/ig-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'input/**'
      - 'sushi-config.yaml'
      - 'ig.ini'
      - '.github/workflows/ig-build.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  # Job 1: Quick SUSHI validation (every push)
  sushi-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SUSHI
        run: npm install -g fsh-sushi

      - name: Run SUSHI
        run: sushi .

  # Job 2: Full IG Publisher build (main + PRs only)
  ig-build:
    runs-on: ubuntu-latest
    needs: sushi-validate
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SUSHI
        run: npm install -g fsh-sushi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Jekyll
        run: gem install jekyll

      - name: Download IG Publisher
        run: |
          mkdir -p input-cache
          curl -L https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar \
            -o input-cache/publisher.jar

      - name: Run IG Publisher
        run: |
          java -Xmx4g -jar input-cache/publisher.jar -ig ig.ini
        timeout-minutes: 30

      - name: Check QA Results
        run: |
          echo "=== QA Summary ==="
          if [ -f output/qa.json ]; then
            python3 -c "
          import json, sys
          with open('output/qa.json') as f:
              qa = json.load(f)
          errors = qa.get('errs', 0)
          warnings = qa.get('warnings', 0)
          print(f'Errors: {errors}')
          print(f'Warnings: {warnings}')
          if errors > 23:
              print(f'FAIL: {errors} errors exceeds IPS baseline of 23')
              sys.exit(1)
          else:
              print(f'OK: {errors} errors within IPS upstream baseline (23)')
          "
          elif [ -f output/qa.html ]; then
            echo "qa.json not found, qa.html exists"
            ls -la output/qa.*
          else
            echo "No QA output found"
            exit 1
          fi

      - name: Upload QA Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: |
            output/qa.html
            output/qa.json
          retention-days: 30

      - name: Upload Full IG Output
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ig-output
          path: output/
          retention-days: 7
